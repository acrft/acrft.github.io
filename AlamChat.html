<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title><style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
}

/* Header */
.header {
  background:#202c33;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.user {
  display:flex;
  align-items:center;
  gap:10px;
}

.user img {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* Messages */
.messages {
  height:calc(100vh - 130px);
  overflow-y:auto;
  padding:10px;
  background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
  background-size:cover;
}

/* Bubble */
.msg {
  max-width:65%;
  padding:8px;
  margin:5px;
  border-radius:10px;
  position:relative;
}

.me {
  background:#005c4b;
  margin-left:auto;
}

.other {
  background:#202c33;
}

/* Time */
.time {
  font-size:10px;
  color:#ccc;
  text-align:right;
}

/* Input */
.input {
  position:fixed;
  bottom:0;
  width:100%;
  background:#202c33;
  padding:10px;
  display:flex;
  align-items:center;
  gap:5px;
}

.input input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.btn {
  background:#25d366;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
</style></head><body><!-- Header --><div class="header">
  <div class="user">
    <img id="avatar" src="https://via.placeholder.com/40">
    <div>
      <div id="name">AlamChat</div>
      <small>متصل الآن</small>
    </div>
  </div>
</div><!-- Messages --><div class="messages" id="messages"></div><!-- Input --><div class="input">
  <input id="msgInput" placeholder="مراسلة...">
  <button class="btn" onclick="sendMessage()">➤</button>
</div><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
  databaseURL: "https://alamchat1-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);

const username = "User-" + Math.floor(Math.random()*1000);

/* إرسال */
function sendMessage(){
  const text = document.getElementById("msgInput").value;
  if(!text) return;

  firebase.database().ref("chat").push({
    name: username,
    text: text,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("msgInput").value="";
}

/* استقبال */
firebase.database().ref("chat").on("child_added", snap=>{
  const m = snap.val();

  const div = document.createElement("div");
  div.classList.add("msg");

  if(m.name === username){
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerHTML = `
    ${m.text}
    <div class="time">${m.time}</div>
  `;

  document.getElementById("messages").appendChild(div);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
});
</script></body>
</html>

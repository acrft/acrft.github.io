<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
background-size:cover;
background-position:center;
color:#fff;
}

/* overlay زي واتساب */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(11,20,26,0.85);
z-index:-1;
}

/* header */
.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#202c33;
display:flex;
align-items:center;
padding:10px;
gap:10px;
font-weight:bold;
}

/* messages */
.messages{
margin-top:60px;
margin-bottom:70px;
padding:10px;
display:flex;
flex-direction:column;
}

/* message */
.msg{
display:flex;
margin:6px;
max-width:80%;
}

.me{
align-self:flex-end;
flex-direction:row-reverse;
}

.other{
align-self:flex-start;
}

/* bubble */
.bubble{
padding:8px 10px;
border-radius:12px;
position:relative;
font-size:14px;
}

/* زي واتساب */
.me .bubble{
background:#005c4b;
border-bottom-right-radius:3px;
}

.other .bubble{
background:#202c33;
border-bottom-left-radius:3px;
}

/* time */
.time{
font-size:10px;
opacity:0.7;
text-align:right;
margin-top:3px;
}

/* input bar */
.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
align-items:center;
gap:8px;
padding:8px;
background:#202c33;
}

/* input */
.input input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#2a3942;
color:#fff;
font-size:14px;
}

/* send button */
.send{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#25d366;
font-size:18px;
}</style>
</head>

<body>

<!-- تسجيل -->
<div id="start">

<h2>AlamChat</h2>

<input id="name" placeholder="اسمك (سريع)">
<input id="email" placeholder="الايميل">
<input id="pass" type="password" placeholder="الباسورد">
<input id="phone" placeholder="+2010xxxxxxx">
<input id="code" placeholder="الكود">

<div id="recaptcha-container"></div>

<button onclick="quickLogin()">دخول سريع</button>
<button onclick="register()">تسجيل</button>
<button onclick="login()">دخول</button>
<button onclick="anon()">زائر</button>
<button onclick="sendCode()">ارسال كود</button>
<button onclick="verifyCode()">تأكيد</button>

</div>

<!-- الشات -->
<div id="chat" style="display:none">

<div class="header">
<span>AlamChat</span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth=firebase.auth()

let name=""

/* ===== دخول سريع ===== */
function quickLogin(){
let n=document.getElementById("name").value.trim()
if(!n){alert("اكتب اسمك");return}
startApp(n)
}

/* ===== تسجيل ===== */
function register(){
let email=emailInput()
let pass=passInput()

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>alert("تم التسجيل"))
.catch(e=>alert(e.message))
}

/* ===== دخول ===== */
function login(){
auth.signInWithEmailAndPassword(emailInput(),passInput())
.catch(e=>alert(e.message))
}

/* ===== زائر ===== */
function anon(){
auth.signInAnonymously()
}

/* ===== phone ===== */
let confirmationResult

window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier('recaptcha-container')

function sendCode(){
auth.signInWithPhoneNumber(document.getElementById("phone").value,window.recaptchaVerifier)
.then(res=>{
confirmationResult=res
alert("تم ارسال الكود")
})
.catch(e=>alert(e.message))
}

function verifyCode(){
confirmationResult.confirm(document.getElementById("code").value)
.catch(e=>alert(e.message))
}

/* ===== بعد الدخول ===== */
auth.onAuthStateChanged(user=>{
if(user){
if(user.isAnonymous){
name="زائر"+Math.floor(Math.random()*1000)
}else if(user.phoneNumber){
name=user.phoneNumber
}else if(user.email){
name=user.email.split("@")[0]
}
startApp(name)
}
})

function startApp(n){
name=n
document.getElementById("start").style.display="none"
document.getElementById("chat").style.display="block"
}

/* ===== ارسال ===== */
function send(){
let text=document.getElementById("msgInput").value
if(!text)return

firebase.database().ref("chat").push({
name:name,
text:text,
time:new Date().toLocaleTimeString()
})

msgInput.value=""
}

/* ===== عرض ===== */
firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()

let div=document.createElement("div")
div.className="msg "+(m.name===name?"me":"other")

div.innerHTML=`
<div class="bubble">
${m.text}
<div class="time">${m.time}</div>
</div>
`

document.getElementById("messages").appendChild(div)
messages.scrollTop=messages.scrollHeight
})

function emailInput(){return document.getElementById("email").value}
function passInput(){return document.getElementById("pass").value}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{margin:0;background:#0b141a;color:#fff;font-family:sans-serif}

/* شاشة البداية */
.start{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:10px
}

input{
padding:10px;
border:none;
border-radius:20px;
width:200px
}

button{
padding:10px;
border:none;
border-radius:20px;
background:#25d366;
cursor:pointer
}

/* ايموجي */
.emojis{
display:flex;
flex-wrap:wrap;
max-width:250px;
gap:5px;
justify-content:center
}

.emoji{
font-size:24px;
cursor:pointer;
padding:5px;
border-radius:10px;
}

.selected{
background:#25d366;
}

/* الشات */
.messages{
height:80vh;
overflow:auto;
padding:10px
}

.msg{
margin:5px;
}

.me{text-align:left}
.other{text-align:right}

</style>
</head>

<body>

<!-- بداية -->
<div id="start" class="start">
<h2>AlamChat 💬</h2>

<input id="name" placeholder="اسمك">

<div class="emojis" id="emojiList"></div>

<button onclick="enterChat()">دخول</button>
</div>

<!-- الشات -->
<div id="chat" style="display:none">
<h3 id="myName"></h3>

<div id="messages" class="messages"></div>

<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMessage()">ارسال</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const config={
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
}
firebase.initializeApp(config)

// ايموجي
const emojis = [
"😀","😃","😄","😁","😆","😅","😂","🤣","🥲","☺️","😊","😇","🙂","🙃","😉","😌",
"😍","🥰","😘","😗","😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🤩","🥳",
"😏","😒","😞","😔","😟","😕","🙁","☹️","😣","😖","😫","😩","🥺","😢","😭",
"😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰","😥","😓",
"🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄",
"😯","😦","😧","😮","😲","🥱","😴","🤤","😪","😵","🤐","🥴",
"🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠"
];
let selectedEmoji="😀"

const list=document.getElementById("emojiList")

emojis.forEach(e=>{
const span=document.createElement("span")
span.innerText=e
span.className="emoji"

span.onclick=()=>{
document.querySelectorAll(".emoji").forEach(x=>x.classList.remove("selected"))
span.classList.add("selected")
selectedEmoji=e
}

list.appendChild(span)
})

// بيانات المستخدم
let myName=""
let myAvatar=""

// دخول
function enterChat(){
const name=document.getElementById("name").value.trim()
if(!name){alert("اكتب اسمك");return}

myName=name
myAvatar=selectedEmoji

document.getElementById("myName").innerText=myAvatar+" "+myName

document.getElementById("start").style.display="none"
document.getElementById("chat").style.display="block"
}

// ارسال
function sendMessage(){
const text=document.getElementById("msgInput").value.trim()
if(!text)return

firebase.database().ref("chat").push({
name:myName,
avatar:myAvatar,
text:text
})

document.getElementById("msgInput").value=""
}

// استقبال
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()

const div=document.createElement("div")
div.className="msg "+(m.name===myName?"me":"other")

div.innerHTML=`
${m.avatar} ${m.name}: ${m.text}
`

document.getElementById("messages").appendChild(div)
document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight
})
</script>

</body>
</html>

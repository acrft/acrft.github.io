<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat 🔐</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}

.login{
display:flex;flex-direction:column;
justify-content:center;align-items:center;
height:100vh;gap:10px
}

.login input{
padding:10px;border:none;border-radius:20px;width:220px
}

.login button{
padding:10px 20px;border:none;
background:#25d366;border-radius:20px;cursor:pointer
}

.header{
position:fixed;top:0;width:100%;
background:#202c33;padding:10px;
display:flex;justify-content:space-between;align-items:center
}

.messages{
margin-top:60px;height:calc(100vh - 140px);
overflow:auto;padding:10px
}

.msg{margin:5px}
.me{text-align:left}
.other{text-align:right}

.input{
position:fixed;bottom:0;width:100%;
background:#202c33;padding:10px;display:flex
}

.input input{flex:1;padding:10px;border-radius:20px;border:none}
</style>
</head>

<body>

<div class="login" id="login">
<h2>AlamChat 🔐</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="name" placeholder="اسمك">
<input id="image" type="file">

<button onclick="register()">تسجيل</button>
<button onclick="loginUser()">دخول</button>
<button onclick="resetPassword()">نسيت كلمة السر؟</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<div id="myName"></div>
<img id="myAvatar" width="40">
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
}

firebase.initializeApp(firebaseConfig)

let currentUser=null

// تسجيل
function register(){
const emailVal=email.value
const pass=password.value
const nameVal=name.value
const file=image.files[0]

if(!emailVal||!pass||!nameVal||!file){
alert("املأ كل البيانات")
return
}

firebase.auth().createUserWithEmailAndPassword(emailVal,pass)
.then(res=>{
const uid=res.user.uid

// إرسال تأكيد الإيميل
res.user.sendEmailVerification()

const reader=new FileReader()
reader.onload=function(){
firebase.database().ref("users/"+uid).set({
name:nameVal,
avatar:reader.result
})
alert("تم التسجيل ✔️ تحقق من الإيميل")
}
reader.readAsDataURL(file)
})
.catch(e=>alert(e.message))
}

// دخول
function loginUser(){
firebase.auth().signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message))
}

// نسيت الباسورد
function resetPassword(){
if(!email.value){
alert("اكتب الإيميل الأول")
return
}
firebase.auth().sendPasswordResetEmail(email.value)
.then(()=>alert("تم إرسال رابط استعادة الباسورد"))
}

// حالة المستخدم
firebase.auth().onAuthStateChanged(user=>{
if(user){

// تحقق من الإيميل
if(!user.emailVerified){
alert("لازم تفعل الإيميل الأول ❗")
firebase.auth().signOut()
return
}

currentUser=user

firebase.database().ref("users/"+user.uid).once("value",snap=>{
const data=snap.val()

login.style.display="none"
chat.style.display="block"

myName.innerText=data.name
myAvatar.src=data.avatar
})
}
})

// ارسال رسالة
function sendMessage(){
const text=msgInput.value
if(!text)return

firebase.database().ref("chat").push({
uid:currentUser.uid,
text:text,
time:Date.now()
})

msgInput.value=""
}

// استقبال
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()

firebase.database().ref("users/"+m.uid).once("value",s=>{
const u=s.val()

const div=document.createElement("div")
div.className="msg "+(m.uid===currentUser.uid?"me":"other")

div.innerHTML=`
<img src="${u.avatar}" width="25" style="border-radius:50%">
${u.name}: ${m.text}
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})
})
</script>

</body>
</html>

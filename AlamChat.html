<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
}

.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.header {
  background:#202c33;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.header img {
  width:40px;
  height:40px;
  border-radius:50%;
}

.messages {
  height:calc(100vh - 130px);
  overflow-y:auto;
  padding:10px;
  padding-bottom:80px;
  background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
  background-size:cover;
}

.msg {
  max-width:65%;
  margin:5px;
}

.me {
  display:flex;
  justify-content:flex-start;
}

.other {
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
  gap:6px;
}
.bubble {
  padding:8px;
  border-radius:10px;
}

.me .bubble {
  background:#005c4b;
}

.other .bubble {
  background:#202c33;
}

.time {
  font-size:10px;
  color:#ccc;
  text-align:right;
}

.input.input {
  display:flex;
  flex-direction:row-reverse;
  gap:5px;
    }
.input input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  background:#25d366;
  border:none;
  padding:10px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="login" id="login">
  <button onclick="login()">Login with Google</button>
</div>

<div id="chat" style="display:none;">

  <div class="header">
<img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">    <div>
      <div id="*AlamChat*"></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="مراسلة...">
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
  authDomain: "alamchat1.firebaseapp.com",
  databaseURL: "https://alamchat1-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);

firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
let currentUser;

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
firebase.auth().signInWithPopup(provider);}

firebase.auth().getRedirectResult().then(result=>{
  if(result.user){
    currentUser = result.user;
  }
});
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";

    document.getElementById("myName").innerText = user.displayName;
    document.getElementById("myAvatar").src = user.photoURL;
  }
});

function sendMessage(){
  const text = document.getElementById("msgInput").value;
  if(!text) return;

  firebase.database().ref("chat").push({
    name: currentUser.displayName,
    avatar: currentUser.photoURL,
    text: text,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("msgInput").value="";
}

firebase.database().ref("chat").on("child_added", snap=>{
  const m = snap.val();

  const div = document.createElement("div");
  div.classList.add("msg");

  if(currentUser && m.name === currentUser.displayName){
    div.classList.add("me");
    div.innerHTML = `
      <div class="bubble">
        ${m.text}
        <div class="time">${m.time}</div>
      </div>
    `;
  } else {
    div.classList.add("other");
    div.innerHTML = `
      <img src="${m.avatar}" width="30" height="30" style="border-radius:50%;">
      <div class="bubble">
        <div style="font-size:12px;color:#ccc">${m.name}</div>
        ${m.text}
        <div class="time">${m.time}</div>
      </div>
    `;
  }

  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
});
</script>

</body>
</html>

<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title><style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
  color:white;
}

/* Login */
.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Header */
.header {
  background:#202c33;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.header img {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* Messages */
.messages {
  height:calc(100vh - 120px);
  overflow-y:auto;
  padding:10px;
  background:url("https://i.imgur.com/7QZ6n3S.jpg");
  background-size:cover;
}

/* Bubble */
.msg {
  max-width:65%;
  padding:8px;
  margin:5px;
  border-radius:10px;
}

.me {
  background:#005c4b;
  margin-left:auto;
}

.other {
  background:#202c33;
}

/* Name */
.name {
  font-size:12px;
  color:#aaa;
}

/* Time */
.time {
  font-size:10px;
  color:#ccc;
  text-align:right;
}

/* Input */
.input {
  position:fixed;
  bottom:0;
  width:100%;
  background:#202c33;
  padding:10px;
  display:flex;
  gap:5px;
}

.input input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button {
  background:#25d366;
  border:none;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
</style></head><body><!-- Login --><div class="login" id="login">
  <button onclick="login()">Login with Google</button>
</div><!-- Chat --><div id="chat" style="display:none;">
  <div class="header">
    <img id="myAvatar">
    <div id="myName"></div>
  </div>  <div class="messages" id="messages"></div>  <div class="input">
    <input id="msgInput" placeholder="مراسلة...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
  authDomain: "alamchat1.firebaseapp.com",
  databaseURL: "https://alamchat1-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);

let currentUser;

/* Login */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

/* After login */
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    currentUser = user;

    document.getElementById("login").style.display="none";
    document.getElementById("chat").style.display="block";

    document.getElementById("myName").innerText = user.displayName;
    document.getElementById("myAvatar").src = user.photoURL;
  }
});

/* Send */
function sendMessage(){
  const text = document.getElementById("msgInput").value;
  if(!text) return;

  firebase.database().ref("chat").push({
    name: currentUser.displayName,
    avatar: currentUser.photoURL,
    text: text,
    time: new Date().toLocaleTimeString()
  });

  document.getElementById("msgInput").value="";
}

/* Receive */
firebase.database().ref("chat").on("child_added", snap=>{
  const m = snap.val();

  const div = document.createElement("div");
  div.classList.add("msg");

  if(currentUser && m.name === currentUser.displayName){
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerHTML = `
    <div class="name">
      <img src="${m.avatar}" style="width:20px;height:20px;border-radius:50%;vertical-align:middle;">
      ${m.name}
    </div>
    ${m.text}
    <div class="time">${m.time}</div>
  `;

  document.getElementById("messages").appendChild(div);

  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
});
</script></body>
</html>

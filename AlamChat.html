<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title><style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b141a;
}

/* Login */
.login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
}

/* App */
.app {
  display:none;
  height:100vh;
}

/* Layout */
.container {
  display:flex;
  height:100%;
}

/* Sidebar */
.sidebar {
  width:35%;
  background:#202c33;
  color:white;
  display:flex;
  flex-direction:column;
}

.top {
  padding:10px;
  border-bottom:1px solid #333;
}

.friend {
  padding:12px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

.friend:hover {
  background:#2a3942;
}

/* Chat */
.chat {
  width:65%;
  display:flex;
  flex-direction:column;
}

.header {
  padding:15px;
  background:#202c33;
  color:white;
}

.messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* Messages */
.msg {
  margin:5px;
  padding:8px;
  max-width:65%;
  border-radius:10px;
}

.me {
  background:#005c4b;
  align-self:flex-end;
  color:white;
}

.other {
  background:#202c33;
  color:white;
}

/* Input */
.input {
  display:flex;
  padding:10px;
  background:#202c33;
  gap:5px;
}

.input input {
  flex:1;
  padding:10px;
}

button {
  padding:8px;
  border:none;
  background:#25d366;
  cursor:pointer;
}
</style></head><body><!-- Login --><div class="login" id="login">
  <h1>🎮 AlamChat</h1>
  <button onclick="login()">Login with Google</button>
</div><!-- App --><div class="app" id="app">
<div class="container">  <!-- Sidebar -->  <div class="sidebar">
    <div class="top">
      <input id="friendId" placeholder="UID صديق">
      <button onclick="addFriend()">➕</button>
    </div><div id="friends"></div>

  </div>  <!-- Chat -->  <div class="chat">
    <div class="header" id="chatName">اختار صديق</div><div class="messages" id="messages"></div>

<div class="input">
  <input id="msgInput" placeholder="اكتب رسالة">
  <button onclick="sendMessage()">➤</button>
  <input type="file" id="imgInput">
  <button onclick="sendImage()">📸</button>
  <button onclick="recordAudio()">🎤</button>
</div>

  </div></div>
</div><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
  authDomain: "alamchat1.firebaseapp.com",
  databaseURL: "https://alamchat1-default-rtdb.firebaseio.com",
  projectId: "alamchat1",
  storageBucket: "alamchat1.appspot.com",
  messagingSenderId: "165465387126",
  appId: "1:165465387126:web:74f4e993aad07bae8f2f57"
};

firebase.initializeApp(firebaseConfig);

let currentUser, currentChat, mediaRecorder, audioChunks=[];

/* Login */
function login(){
 const provider = new firebase.auth.GoogleAuthProvider();
 firebase.auth().signInWithPopup(provider);
}

firebase.auth().onAuthStateChanged(user=>{
 if(user){
  currentUser=user;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  firebase.database().ref("users/"+user.uid).set({
    uid:user.uid,
    name:user.displayName
  });

  loadFriends();
 }
});

/* Add Friend */
function addFriend(){
 const id = document.getElementById("friendId").value;
 if(!id) return;

 firebase.database().ref("friends/"+currentUser.uid+"/"+id).set(true);
}

/* Load Friends */
function loadFriends(){
 firebase.database().ref("friends/"+currentUser.uid).on("value", snap=>{
  const div=document.getElementById("friends");
  div.innerHTML="";

  snap.forEach(child=>{
    const uid=child.key;

    firebase.database().ref("users/"+uid).once("value").then(s=>{
      const u=s.val();

      if(!u) return;

      const f=document.createElement("div");
      f.className="friend";
      f.innerText=u.name;
      f.onclick=()=>openChat(uid,u.name);

      div.appendChild(f);
    });
  });
 });
}

/* Open Chat */
function openChat(uid,name){
 currentChat=uid;
 document.getElementById("chatName").innerText=name;
 document.getElementById("messages").innerHTML="";

 firebase.database().ref("messages").off();

 firebase.database().ref("messages").on("child_added", snap=>{
  const m=snap.val();

  if((m.from===currentUser.uid && m.to===uid)||(m.from===uid && m.to===currentUser.uid)){
    const d=document.createElement("div");
    d.classList.add("msg", m.from===currentUser.uid?"me":"other");

    if(m.image){
      d.innerHTML=`<img src="${m.image}" width="150">`;
    }else if(m.audio){
      d.innerHTML=`<audio controls src="${m.audio}"></audio>`;
    }else{
      d.innerText=m.text;
    }

    document.getElementById("messages").appendChild(d);
  }
 });
}

/* Send Text */
function sendMessage(){
 const text=document.getElementById("msgInput").value;
 if(!text || !currentChat) return;

 firebase.database().ref("messages").push({
  text,
  from:currentUser.uid,
  to:currentChat
 });

 document.getElementById("msgInput").value="";
}

/* Send Image */
function sendImage(){
 const file=document.getElementById("imgInput").files[0];
 if(!file || !currentChat) return;

 const ref=firebase.storage().ref("images/"+Date.now());

 ref.put(file).then(()=>{
  ref.getDownloadURL().then(url=>{
    firebase.database().ref("messages").push({
      image:url,
      from:currentUser.uid,
      to:currentChat
    });
  });
 });
}

/* Record Audio */
function recordAudio(){
 navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  mediaRecorder=new MediaRecorder(stream);
  mediaRecorder.start();

  mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

  setTimeout(()=>{
    mediaRecorder.stop();

    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks);
      const ref=firebase.storage().ref("audio/"+Date.now());

      ref.put(blob).then(()=>{
        ref.getDownloadURL().then(url=>{
          firebase.database().ref("messages").push({
            audio:url,
            from:currentUser.uid,
            to:currentChat
          });
        });
      });

      audioChunks=[];
    };
  },3000);
 });
}
</script></body>
</html>

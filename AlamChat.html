<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlamChat</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Cairo', sans-serif;
        background: url('https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png')
          center/cover fixed;
        color: #fff;
      }

      body::before {
        content: '';
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(6px);
        z-index: -1;
      }

      /* تسجيل */
      #start {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 15px;
      }

      #start input {
        padding: 14px;
        border-radius: 30px;
        border: none;
        width: 70%;
        max-width: 280px;
      }

      #start button {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: #25d366;
        color: #fff;
      }

      /* الهيدر */
      .header {
        position: fixed;
        top: 0;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: rgba(32, 44, 51, 0.9);
      }

      .header img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }

      /* الرسائل */
      .messages {
        margin-top: 65px;
        height: calc(100vh - 140px);
        overflow: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
      }

      /* رسالة */
      .msg {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        margin: 8px;
        max-width: 80%;
      }

      .me {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .other {
        align-self: flex-start;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #444;
      }

      /* الفقاعة */
      .bubble {
        padding: 10px;
        border-radius: 14px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      .me .bubble {
        background: #005c4b;
      }

      .other .bubble {
        background: #202c33;
      }

      .name {
        font-size: 12px;
        opacity: 0.7;
      }

      .time {
        font-size: 10px;
        opacity: 0.6;
        text-align: right;
      }

      .seen {
        color: #4fc3f7;
      }

      /* input */
      .input {
        position: fixed;
        bottom: 0;
        width: 100%;
        display: flex;
        gap: 8px;
        padding: 8px;
        background: #202c33;
      }

      .input input {
        flex: 1;
        padding: 14px;
        border-radius: 30px;
        border: none;
        background: #2a3942;
        color: #fff;
      }

      .send {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: #25d366;
      }

      /* reply */
      #replyBox {
        background: #111;
        padding: 5px;
        margin: 5px;
        border-radius: 8px;
      }

      /* typing */
      #typing span {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0% {
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div id="start">
      <input id="name" placeholder="اسمك" />
      <button onclick="startChat()">دخول</button>
    </div>

    <div id="chat" style="display: none">
      <div class="header">
        <img
          src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png"
        />
        <span>AlamChat</span>
        <span id="typing"></span>
      </div>

      <div id="messages" class="messages"></div>

      <div id="replyBox" style="display: none">
        <span id="replyText"></span>
        <button onclick="hideReply()">❌</button>
      </div>

      <div class="input">
        <input id="msgInput" placeholder="اكتب..." oninput="typing()" />
        <button onclick="addEmoji()">😀</button>
        <button onclick="imgSend.click()">📷</button>
        <button onclick="startRec()">🎤</button>
        <input type="file" id="imgSend" style="display: none" />
        <button class="send" onclick="send()">➤</button>
      </div>
    </div>

    <audio
      id="sound"
      src="https://www.soundjay.com/buttons/sounds/button-3.mp3"
    ></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
      firebase.initializeApp({
        apiKey: 'AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0',
        databaseURL: 'https://alamchat1-default-rtdb.firebaseio.com',
      });

      let name = '';
      let replyTo = null;

      const start = document.getElementById('start');
      const chat = document.getElementById('chat');
      const messages = document.getElementById('messages');
      const msgInput = document.getElementById('msgInput');
      const typingSpan = document.getElementById('typing');

      function startChat() {
        let input = document.getElementById('name');
        if (!input.value) {
          alert('اكتب اسمك');
          return;
        }

        name = input.value;
        start.style.display = 'none';
        chat.style.display = 'block';

        firebase
          .database()
          .ref('online/' + name)
          .set(true);
      }

      window.onbeforeunload = () => {
        firebase
          .database()
          .ref('online/' + name)
          .remove();
      };

      /* إرسال */
      function send() {
        let text = msgInput.value.trim();
        if (!text) return;

        firebase.database().ref('chat').push({
          name,
          text,
          reply: replyTo,
          time: new Date().toLocaleTimeString(),
          seen: false,
          type: 'text',
        });

        replyTo = null;
        msgInput.value = '';
        hideReply();
      }

      /* emoji */
      function addEmoji() {
        msgInput.value += '😀';
      }

      /* reply */
      function setReply(t) {
        replyTo = t;
        replyBox.style.display = 'block';
        replyText.innerText = t;
      }
      function hideReply() {
        replyTo = null;
        replyBox.style.display = 'none';
      }

      /* typing */
      function typing() {
        firebase.database().ref('typing').set(name);
        setTimeout(() => firebase.database().ref('typing').set(''), 1000);
      }

      firebase
        .database()
        .ref('typing')
        .on('value', (s) => {
          let t = s.val();
          if (t && t !== name) {
            typingSpan.innerHTML =
              t + ' يكتب<span>.</span><span>.</span><span>.</span>';
          } else {
            typingSpan.innerText = '';
          }
        });

      /* صورة */
      imgSend.onchange = async () => {
        let file = imgSend.files[0];
        if (!file) return;

        let form = new FormData();
        form.append('image', file);

        let res = await fetch(
          'https://api.imgbb.com/1/upload?key=3a9ef8e3be83e9934cc9019db6d0773e',
          {
            method: 'POST',
            body: form,
          },
        );

        let data = await res.json();

        firebase.database().ref('chat').push({
          name: name,
          img: data.data.url,
          type: 'img',
          time: new Date().toLocaleTimeString(),
        });
      };

      /* صوت */
      let recorder,
        audioChunks = [];
      async function startRec() {
        let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);

        recorder.ondataavailable = (e) => audioChunks.push(e.data);

        recorder.onstop = async () => {
          let blob = new Blob(audioChunks);
          audioChunks = [];

          let form = new FormData();
          form.append('image', blob);

          let res = await fetch(
            'https://api.imgbb.com/1/upload?key=3a9ef8e3be83e9934cc9019db6d0773e',
            {
              method: 'POST',
              body: form,
            },
          );

          let data = await res.json();

          firebase.database().ref('chat').push({
            name: name,
            audio: data.data.url,
            type: 'audio',
            time: new Date().toLocaleTimeString(),
          });
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 3000);
      }

      /* عرض */
      firebase
        .database()
        .ref('chat')
        .on('child_added', (snap) => {
          let m = snap.val();
          let id = snap.key;
          if (!m) return;

          let isMe = m.name === name;
          let div = document.createElement('div');
          div.className = 'msg ' + (isMe ? 'me' : 'other');

          let content = '';
          if (m.type === 'img') {
            content = `<img src="${m.img}" style="max-width:200px;border-radius:10px">`;
          } else if (m.type === 'audio') {
            content = `<audio controls src="${m.audio}"></audio>`;
          } else {
            content = m.text;
          }

          div.innerHTML = `
<div class="avatar">${m.name ? m.name[0] : '👤'}</div>

<div class="bubble" onclick="setReply('${m.text || ''}')">
<div class="name">${m.name || 'مستخدم'}</div>

${m.reply ? `<div style="font-size:11px;opacity:0.6">${m.reply}</div>` : ''}

${content}

<div class="time">
${m.time || ''}
${isMe ? `<span class="seen">${m.seen ? '✔✔' : '✔'}</span>` : ''}
</div>
</div>
`;

          messages.appendChild(div);
          messages.scrollTop = messages.scrollHeight;

          if (!isMe) {
            document.getElementById('sound').play();
            navigator.vibrate?.(50);
            firebase
              .database()
              .ref('chat/' + id)
              .update({ seen: true });
          }
        });

      /* online */
      firebase
        .database()
        .ref('online')
        .on('value', (s) => {
          typingSpan.innerText = '🟢 ' + s.numChildren() + ' متصل';
        });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
background-size:cover;
color:#fff;
}

.header{
background:rgba(32,44,51,0.9);
padding:10px;
display:flex;
justify-content:space-between;
}

.messages{
height:calc(100vh - 150px);
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
display:flex;
align-items:flex-end;
gap:5px;
max-width:80%;
margin:5px;
animation:fadeIn 0.2s ease;
}

.me{align-self:flex-end; flex-direction:row-reverse}
.other{align-self:flex-start}

.avatar{
width:30px;
height:30px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
}

.bubble{
padding:10px;
border-radius:10px;
position:relative;
}

.me .bubble{
background:#005c4b;
}
.other .bubble{
background:#202c33;
}

.me .bubble::after{
content:"";
position:absolute;
right:-6px;
bottom:0;
border-left:6px solid #005c4b;
border-top:6px solid transparent;
}

.other .bubble::after{
content:"";
position:absolute;
left:-6px;
bottom:0;
border-right:6px solid #202c33;
border-top:6px solid transparent;
}

.time{
font-size:10px;
text-align:right;
}

.seen{
color:#4fc3f7;
}

.reply{
font-size:12px;
color:#ccc;
border-left:3px solid #25d366;
padding-left:5px;
margin-bottom:5px;
}

.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#202c33;
padding:10px;
gap:5px;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:50%;
background:#25d366;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px)}
to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<div id="start">
<input id="name" placeholder="اسمك">
<button onclick="startChat()">دخول</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<span id="status">متصل الآن</span>
<span id="typing"></span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب..." oninput="typing()">
<input type="file" id="img">
<button onclick="record()">🎤</button>
<button onclick="send()">➤</button>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const start = document.getElementById("start")
const chat = document.getElementById("chat")
const msgInput = document.getElementById("msgInput")
const messages = document.getElementById("messages")
const typingSpan = document.getElementById("typing")

let name = localStorage.getItem("name") || ""
let replyText = null

function startChat(){
if(!document.getElementById("name").value){
alert("اكتب اسمك")
return
}

name = document.getElementById("name").value
localStorage.setItem("name", name)

start.style.display="none"
chat.style.display="block"

firebase.database().ref("online/"+name).set(true)
}

window.onbeforeunload=()=>{
firebase.database().ref("online/"+name).remove()
}

function send(){
const text=msgInput.value
const file=document.getElementById("img").files[0]

let msg={
name,
text,
time:new Date().toLocaleTimeString(),
seen:false,
reply:replyText
}

if(file){
const reader=new FileReader()
reader.onload=e=>{
msg.img=e.target.result
firebase.database().ref("chat").push(msg)
}
reader.readAsDataURL(file)
}else{
firebase.database().ref("chat").push(msg)
}

msgInput.value=""
document.getElementById("img").value=""
replyText=null
}

function record(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
const rec=new MediaRecorder(stream)
rec.start()

let chunks=[]
rec.ondataavailable=e=>chunks.push(e.data)

setTimeout(()=>{
rec.stop()
rec.onstop=()=>{
const blob=new Blob(chunks)
const reader=new FileReader()
reader.onload=e=>{
firebase.database().ref("chat").push({
name,
audio:e.target.result,
time:new Date().toLocaleTimeString()
})
}
reader.readAsDataURL(blob)
}
},3000)
})
}

function typing(){
firebase.database().ref("typing").set(name)
setTimeout(()=>firebase.database().ref("typing").set(""),1000)
}

firebase.database().ref("typing").on("value",s=>{
let t=s.val()
if(t && t!==name) typingSpan.innerText=t+" يكتب..."
else typingSpan.innerText=""
})

firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()
const id=snap.key
const isMe=m.name===name

const div=document.createElement("div")
div.className="msg "+(isMe?"me":"other")

div.innerHTML=`
<div class="avatar">${m.name[0]}</div>

<div class="bubble">
${m.reply ? `<div class="reply">${m.reply}</div>`:""}
${m.img ? `<img src="${m.img}" width="150">`:""}
${m.audio ? `<audio controls src="${m.audio}"></audio>`:""}
${m.text||""}
<div class="time">
${m.time}
${isMe ? `<span class="seen ${m.seen?'seen':''}">✔✔</span>`:""}
</div>
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

if(!isMe){
document.getElementById("sound").play()
if(navigator.vibrate) navigator.vibrate(100)
firebase.database().ref("chat/"+id).update({seen:true})
}

div.onclick=()=>{
if(isMe && confirm("حذف الرسالة؟")){
firebase.database().ref("chat/"+id).remove()
}
}

div.ondblclick=()=>{
replyText=m.text||"رسالة"
alert("هترد على: "+replyText)
}

div.oncontextmenu=(e)=>{
e.preventDefault()
if(isMe){
let newText=prompt("تعديل الرسالة", m.text)
if(newText){
firebase.database().ref("chat/"+id).update({text:newText})
}
}
}
})
</script>

</body>
</html>

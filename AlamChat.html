<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat v1.6</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;font-family:sans-serif;color:#e9edef;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
}
body::before{
content:"";position:fixed;inset:0;background:rgba(11,20,26,.85);z-index:-1;
}

#login{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
}
.card{
width:100%;max-width:360px;
background:rgba(32,44,51,.9);
border-radius:20px;
padding:25px;text-align:center;
}
.logo{
width:80px;height:80px;border-radius:50%;
margin:auto;margin-bottom:10px;
background:url("https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png") center/cover;
}
.btn{
width:100%;padding:14px;border:none;border-radius:30px;
background:#25d366;color:#fff;font-size:16px;
}
.btn.loading{opacity:.6}

#chat{display:none}
.header{
position:fixed;top:0;width:100%;height:60px;
background:#202c33;
display:flex;align-items:center;justify-content:space-between;
padding:0 10px;
}
.user{display:flex;align-items:center;gap:10px}
.user img{width:40px;height:40px;border-radius:50%}

.messages{
position:fixed;top:60px;bottom:70px;width:100%;
overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px;
}

.msg{display:flex;max-width:85%}
.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}

.avatar{width:35px;height:35px;border-radius:50%;margin:0 5px}

.bubble{padding:8px 10px;border-radius:12px}
.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}

.name{font-size:12px;color:#25d366;margin-bottom:2px}

.input{
position:fixed;bottom:0;width:100%;
display:flex;padding:8px;background:#202c33;
}
.input input{
flex:1;padding:10px;border-radius:20px;border:none;
background:#2a3942;color:#fff
}
.send{
width:45px;height:45px;border-radius:50%;
border:none;background:#25d366
}
</style>
</head>

<body>

<div id="login">
<div class="card">
<div class="logo"></div>
<h3>AlamChat</h3>
<button id="loginBtn" class="btn">الدخول بجوجل</button>
</div>
</div>

<div id="chat">
<div class="header">
<div class="user" id="userInfo"></div>
<button id="logoutBtn">🚪</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب...">
<button class="send" id="sendBtn">➤</button>
</div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth = firebase.auth()
const db = firebase.database()

const loginEl = document.getElementById("login")
const chatEl = document.getElementById("chat")
const loginBtn = document.getElementById("loginBtn")
const logoutBtn = document.getElementById("logoutBtn")
const sendBtn = document.getElementById("sendBtn")
const msgInput = document.getElementById("msgInput")
const messagesEl = document.getElementById("messages")
const userInfo = document.getElementById("userInfo")

let currentUser
let chatRef = db.ref("chat")

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)

/* login */
loginBtn.onclick = ()=>{
loginBtn.classList.add("loading")
const provider = new firebase.auth.GoogleAuthProvider()
auth.signInWithRedirect(provider)
}

/* redirect */
auth.getRedirectResult().catch(err=>console.log(err))

/* auth state */
auth.onAuthStateChanged(user=>{
if(user){
currentUser = user

loginEl.style.display="none"
chatEl.style.display="block"

userInfo.innerHTML=`
<img src="${user.photoURL || 'https://via.placeholder.com/40'}">
<div>${user.displayName || "بدون اسم"}<br><small style="opacity:.6">متصل الآن</small></div>
`

loadMessages()

}else{
loginEl.style.display="flex"
chatEl.style.display="none"
loginBtn.classList.remove("loading")
}
})

/* send */
sendBtn.onclick = send
msgInput.addEventListener("keypress", e=>{
if(e.key==="Enter") send()
})

function send(){
let text = msgInput.value.trim()
if(!text || !currentUser) return

chatRef.push({
uid: currentUser.uid,
name: currentUser.displayName || "بدون اسم",
photo: currentUser.photoURL || "",
text: text,
time: Date.now()
})

msgInput.value=""
}

/* load messages */
function loadMessages(){
chatRef.off() // يمنع التكرار

chatRef.limitToLast(100).on("child_added", snap=>{
let m = snap.val()

let div=document.createElement("div")
div.className="msg "+(m.uid===currentUser.uid?"me":"other")

userInfo.innerHTML=`
<img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<div>AlamCraft ☘️<br><small style="opacity:.6">متصل الآن</small></div>
: `<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:18px;background:#2a3942;">🙂</div>`
}
<div class="bubble">
<div class="name">${m.name}</div>
${m.text}
</div>
`

messagesEl.appendChild(div)
messagesEl.scrollTop = messagesEl.scrollHeight
})
}

/* logout */
logoutBtn.onclick = ()=>{
auth.signOut()
}
</script>

</body>
</html>

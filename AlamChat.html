<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat v1.0</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:sans-serif;
color:#e9edef;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
}

/* overlay */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(11,20,26,.85);
z-index:-1;
}

/* login */
#start{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
}
.card{
width:100%;
max-width:380px;
background:#202c33;
border-radius:16px;
padding:18px;
}

.card input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:25px;
border:none;
background:#2a3942;
color:#fff;
}

.row{
display:flex;
gap:6px;
flex-wrap:wrap;
}
.row button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#25d366;
color:#fff;
}

/* header */
.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#202c33;
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

.header img{
width:40px;height:40px;border-radius:50%;
}

.title{
font-weight:bold;
}
.version{
font-size:12px;
opacity:.7;
}

/* logout */
.logout{
margin-right:auto;
background:red;
border:none;
color:#fff;
padding:6px 10px;
border-radius:8px;
}

/* messages */
.messages{
position:fixed;
top:60px;
bottom:70px;
width:100%;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* msg */
.msg{display:flex;max-width:80%}
.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}

.bubble{
background:#202c33;
padding:8px;
border-radius:10px;
}

.me .bubble{
background:#005c4b;
}

/* input */
.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:8px;
padding:10px;
background:#202c33;
}
.input input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#2a3942;
color:#fff;
}
.send{
width:45px;height:45px;
border-radius:50%;
border:none;
background:#25d366;
color:#fff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="start">
<div class="card">

<input id="name" placeholder="اسمك (سريع)">
<input id="email" placeholder="الايميل">
<input id="pass" type="password" placeholder="الباسورد">
<input id="phone" placeholder="+2010xxxxxxx">
<input id="code" placeholder="الكود">

<div id="recaptcha-container"></div>

<div class="row">
<button onclick="quickLogin()">👤 سريع</button>
<button onclick="register()">🆕 تسجيل</button>
<button onclick="login()">🔑 دخول</button>
<button onclick="anon()">👻 زائر</button>
<button onclick="sendCode()">📱 كود</button>
<button onclick="verifyCode()">✅ تأكيد</button>
</div>

</div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">

<div class="header">
<img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<div>
<div class="title">AlamChat</div>
<div class="version">v1.0</div>
</div>

<button class="logout" onclick="logout()">خروج</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب...">
<button class="send" onclick="send()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth=firebase.auth()
let name=""

/* login methods */
function quickLogin(){
let n=nameInput()
if(!n)return alert("اكتب اسمك")
startApp(n)
}

function register(){
auth.createUserWithEmailAndPassword(emailInput(),passInput())
.catch(e=>alert(e.message))
}

function login(){
auth.signInWithEmailAndPassword(emailInput(),passInput())
.catch(e=>alert(e.message))
}

function anon(){
auth.signInAnonymously()
}

/* phone */
let confirmationResult
window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier('recaptcha-container')

function sendCode(){
auth.signInWithPhoneNumber(phoneInput(),window.recaptchaVerifier)
.then(res=>{confirmationResult=res;alert("تم ارسال الكود")})
.catch(e=>alert(e.message))
}

function verifyCode(){
confirmationResult.confirm(codeInput())
.catch(e=>alert(e.message))
}

/* auth state */
auth.onAuthStateChanged(user=>{
if(user){
if(user.isAnonymous){
name="زائر"+Math.floor(Math.random()*1000)
}else if(user.phoneNumber){
name=user.phoneNumber
}else if(user.email){
name=user.email.split("@")[0]
}
startApp(name)
}
})

function startApp(n){
name=n
start.style.display="none"
chat.style.display="block"
}

/* logout */
function logout(){
auth.signOut()
location.reload()
}

/* send */
function send(){
let text=msgInput.value
if(!text)return

firebase.database().ref("chat").push({
name:name,
text:text,
time:new Date().toLocaleTimeString()
})

msgInput.value=""
}

/* receive */
firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()
let div=document.createElement("div")
div.className="msg "+(m.name===name?"me":"other")

div.innerHTML=`
<div class="bubble">
${m.text}
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})

/* helpers */
function nameInput(){return document.getElementById("name").value}
function emailInput(){return document.getElementById("email").value}
function passInput(){return document.getElementById("pass").value}
function phoneInput(){return document.getElementById("phone").value}
function codeInput(){return document.getElementById("code").value}
</script>

</body>
</html>

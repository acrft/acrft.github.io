<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{margin:0;background:#0b141a;color:#fff;font-family:sans-serif}

.login{
display:flex;flex-direction:column;
align-items:center;justify-content:center;
height:100vh;gap:10px
}

.login input{
padding:10px;border:none;border-radius:20px;width:220px
}

.login button{
padding:10px;border:none;border-radius:20px;background:#25d366
}

.header{
position:fixed;top:0;width:100%;
background:#202c33;padding:10px;
display:flex;justify-content:space-between;align-items:center
}

.messages{
margin-top:60px;
height:calc(100vh - 140px);
overflow:auto;padding:10px
}

.msg{margin:5px}
.me{text-align:left}
.other{text-align:right}

.input{
position:fixed;bottom:0;width:100%;
display:flex;background:#202c33;padding:10px
}

.input input{
flex:1;padding:10px;border-radius:20px;border:none
}

button{cursor:pointer}
</style>
</head>

<body>

<div id="login" class="login">
<h2>AlamChat 🔐</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="name" placeholder="اسمك">
<input id="image" type="file">

<button onclick="register()">تسجيل</button>
<button onclick="loginUser()">دخول</button>
<button onclick="resetPassword()">نسيت كلمة السر</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<span id="myName"></span>
<button onclick="logout()">خروج</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب رسالة...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
}
firebase.initializeApp(firebaseConfig)

let currentUser,lastSend=0

// تسجيل
function register(){
const emailVal=email.value
const pass=password.value
const nameVal=name.value
const file=image.files[0]

if(!emailVal||!pass||!nameVal){
alert("املأ البيانات")
return
}

// 🟢 لو مفيش صورة
if(!file){

// نعمل صورة افتراضية (حرف من الاسم)
const avatar = "https://ui-avatars.com/api/?name=" + encodeURIComponent(nameVal)

firebase.auth().createUserWithEmailAndPassword(emailVal,pass)
.then(res=>{
const uid=res.user.uid

res.user.sendEmailVerification()

firebase.database().ref("users/"+uid).set({
name:nameVal,
avatar:avatar,
online:true
})

alert("تم التسجيل ✔️ فعل الإيميل")
})

return
}

// 🔵 لو فيه صورة
const formData=new FormData()
formData.append("image",file)

fetch("https://api.imgbb.com/1/upload?key=3a9ef8e3be83e9934cc9019db6d0773e",{
method:"POST",
body:formData
})
.then(r=>r.json())
.then(data=>{

const imageUrl=data.data.url

firebase.auth().createUserWithEmailAndPassword(emailVal,pass)
.then(res=>{
const uid=res.user.uid

res.user.sendEmailVerification()

firebase.database().ref("users/"+uid).set({
name:nameVal,
avatar:imageUrl,
online:true
})

alert("تم التسجيل ✔️ فعل الإيميل")
})

})
.catch(()=>{
alert("فشل رفع الصورة")
})
}

firebase.auth().createUserWithEmailAndPassword(emailVal,pass)
.then(res=>{
const uid=res.user.uid

res.user.sendEmailVerification()

const formData=new FormData()
formData.append("image",file)

fetch("https://api.imgbb.com/1/upload?key=3a9ef8e3be83e9934cc9019db6d0773e",{
method:"POST",
body:formData
})
.then(r=>r.json())
.then(data=>{
const imageUrl=data.data.url

firebase.database().ref("users/"+uid).set({
name:nameVal,
avatar:imageUrl,
online:true
})

alert("تم التسجيل ✔️ فعل الإيميل")
})
})
.catch(e=>alert(e.message))
}

// دخول
function loginUser(){
firebase.auth().signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message))
}

// تسجيل خروج
function logout(){
firebase.auth().signOut()
location.reload()
}

// نسيت الباسورد
function resetPassword(){
if(!email.value){
alert("اكتب الإيميل الأول")
return
}
firebase.auth().sendPasswordResetEmail(email.value)
.then(()=>alert("تم إرسال رابط"))
}

// حالة المستخدم
firebase.auth().onAuthStateChanged(user=>{
if(user){

if(!user.emailVerified){
alert("فعل الإيميل ❗")
firebase.auth().signOut()
return
}

currentUser=user

firebase.database().ref("users/"+user.uid).once("value",s=>{
myName.innerText=s.val().name
})

login.style.display="none"
chat.style.display="block"

firebase.database().ref("users/"+user.uid).update({online:true})
}
})

// خروج = Offline
window.onbeforeunload=()=>{
if(currentUser){
firebase.database().ref("users/"+currentUser.uid).update({online:false})
}
}

// ارسال رسالة
function sendMessage(){
if(Date.now()-lastSend<1000)return
lastSend=Date.now()

const text=msgInput.value
if(!text)return

firebase.database().ref("chat").push({
uid:currentUser.uid,
text:text,
time:Date.now(),
seen:false
})

msgInput.value=""
}

// استقبال الرسائل
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()

firebase.database().ref("users/"+m.uid).once("value",s=>{
const u=s.val()

const div=document.createElement("div")
div.className="msg "+(m.uid===currentUser.uid?"me":"other")

div.innerHTML=`
<img src="${u.avatar}" width="25" style="border-radius:50%">
${u.name}: ${m.text}
${m.uid===currentUser.uid ? (m.seen?"✔✔":"✔") : ""}
`

if(m.uid!==currentUser.uid){
snap.ref.update({seen:true})
}

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})
})
</script>

</body>
  </html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat v1.3</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;font-family:sans-serif;color:#e9edef;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
}
body::before{
content:"";position:fixed;inset:0;background:rgba(11,20,26,.85);z-index:-1;
}

/* ===== Login UI ===== */
#login{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
padding:20px;
}
.card{
width:100%;max-width:360px;
background:rgba(32,44,51,.9);
backdrop-filter: blur(10px);
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.5);
animation:fadeIn .4s ease;
}
.logo{
width:80px;height:80px;border-radius:50%;
margin:auto;margin-bottom:10px;
background:url("https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png") center/cover;
}
.title{font-size:22px;margin:10px 0}
.sub{font-size:13px;opacity:.7;margin-bottom:20px}

.btn{
width:100%;
padding:14px;
border:none;border-radius:30px;
background:#25d366;color:#fff;
font-size:16px;
display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn.loading{opacity:.6;pointer-events:none}
.spinner{
width:18px;height:18px;
border:3px solid #fff;border-top:3px solid transparent;
border-radius:50%;animation:spin 1s linear infinite;
display:none;
}
.btn.loading .spinner{display:block}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

/* ===== Chat ===== */
#chat{display:none}

.header{
position:fixed;top:0;width:100%;height:60px;
background:#202c33;
display:flex;align-items:center;justify-content:space-between;
padding:0 10px;
}
.user{display:flex;align-items:center;gap:10px}
.user img{width:40px;height:40px;border-radius:50%}

.messages{
position:fixed;top:60px;bottom:70px;width:100%;
overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px;
}

.msg{display:flex;max-width:85%}
.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}

.avatar{width:35px;height:35px;border-radius:50%;margin:0 5px}

.bubble{padding:8px 10px;border-radius:12px}
.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}

.name{font-size:12px;color:#25d366;margin-bottom:2px}

/* input */
.input{
position:fixed;bottom:0;width:100%;
display:flex;padding:8px;background:#202c33;gap:5px;
}
.input input{
flex:1;padding:10px;border-radius:20px;border:none;
background:#2a3942;color:#fff
}
.send{
width:45px;height:45px;border-radius:50%;
border:none;background:#25d366
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="card">
<div class="logo"></div>
<div class="title">AlamChat</div>
<div class="sub">دردشة سريعة وآمنة</div>

<button id="loginBtn" class="btn" onclick="login()">
<span>الدخول بجوجل</span>
<div class="spinner"></div>
</button>
</div>
</div>

<!-- CHAT -->
<div id="chat">
<div class="header">
<div class="user" id="userInfo"></div>
<button onclick="logout()">🚪</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب رسالة...">
<button class="send" onclick="send()">➤</button>
</div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth=firebase.auth()
let currentUser

/* حفظ الجلسة */
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)

/* login */
function login(){
loginBtn.classList.add("loading")
const provider=new firebase.auth.GoogleAuthProvider()
auth.signInWithRedirect(provider)
}

/* redirect result */
auth.onAuthStateChanged(user=>{
if(user){
currentUser=user

login.style.display="none"
chat.style.display="block"

userInfo.innerHTML=`
<img src="${user.photoURL}">
<div>${user.displayName}<br><small style="opacity:.6">متصل الآن</small></div>
`
}else{
login.style.display="flex"
chat.style.display="none"
}
})

/* state */
auth.onAuthStateChanged(user=>{
if(user){
currentUser=user

login.style.display="none"
chat.style.display="block"

userInfo.innerHTML=`
<img src="${user.photoURL}">
<div>${user.displayName}<br><small style="opacity:.6">متصل الآن</small></div>
`
}
})

/* send */
function send(){
let text=msgInput.value.trim()
if(!text)return

firebase.database().ref("chat").push({
uid:currentUser.uid,
name:currentUser.displayName,
photo:currentUser.photoURL,
text:text
})

msgInput.value=""
}

/* receive */
firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()

let div=document.createElement("div")
div.className="msg "+(m.uid==currentUser.uid?"me":"other")

div.innerHTML=`
<img class="avatar" src="${m.photo}">
<div class="bubble">
<div class="name">${m.name}</div>
${m.text}
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})

/* logout */
function logout(){
auth.signOut()
location.reload()
}
</script>

</body>
</html>

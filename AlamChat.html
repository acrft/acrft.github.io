<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:#fff}
.messages{margin-top:60px;margin-bottom:70px;padding:10px;display:flex;flex-direction:column}
.msg{max-width:80%;margin:5px}
.me{align-self:flex-end}
.other{align-self:flex-start}
.bubble{padding:8px;border-radius:10px}
.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}
.sender{font-size:12px;opacity:.7}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="phone" placeholder="+2010...">
<div id="recaptcha-container"></div>
<button onclick="sendCode()">إرسال كود</button>
<input id="code" placeholder="الكود">
<button onclick="verifyCode()">دخول</button>
</div>

<!-- NAME -->
<div id="nameBox" style="display:none">
<input id="username" placeholder="اكتب اسمك">
<button onclick="saveName()">حفظ</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<button onclick="logout()">خروج</button>
<div id="messages" class="messages"></div>

<input id="msgInput">
<button onclick="send()">إرسال</button>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth=firebase.auth()
let currentUser
let userName=""
let canChangeName=true

window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier('recaptcha-container')

function sendCode(){
auth.signInWithPhoneNumber(phone.value,recaptchaVerifier)
.then(res=>window.confirmationResult=res)
}

function verifyCode(){
confirmationResult.confirm(code.value)
}

auth.onAuthStateChanged(user=>{
if(user){
currentUser=user

firebase.database().ref("users/"+user.uid).once("value",snap=>{
let data=snap.val()

if(!data){
login.style.display="none"
nameBox.style.display="block"
}else{
userName=data.name
canChangeName=(Date.now()-data.lastChange)>86400000
startChat()
}
})
}
})

function saveName(){
let n=username.value
firebase.database().ref("users/"+currentUser.uid).set({
name:n,
lastChange:Date.now()
})
userName=n
startChat()
}

function startChat(){
login.style.display="none"
nameBox.style.display="none"
chat.style.display="block"
}

function send(){
if(!msgInput.value)return
firebase.database().ref("chat").push({
uid:currentUser.uid,
name:userName,
text:msgInput.value
})
msgInput.value=""
}

firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()
let div=document.createElement("div")
div.className="msg "+(m.uid==currentUser.uid?"me":"other")

div.innerHTML=`
<div class="bubble">
<div class="sender">${m.name}</div>
${m.text}
</div>
`

if(m.uid==currentUser.uid){
div.onclick=()=>firebase.database().ref("chat/"+snap.key).remove()
}

messages.appendChild(div)
})

function logout(){
auth.signOut()
location.reload()
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:#e9edef;
  background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
}

/* overlay زي واتساب */
body::before{
  content:"";
  position:fixed; inset:0;
  background:rgba(11,20,26,.86);
  z-index:-1;
}

/* ===== Login (نضيف ومتمركز) ===== */
#start{
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:16px;
}
.card{
  width:100%; max-width:380px;
  background:#202c33;
  border-radius:16px;
  padding:18px;
  box-shadow:0 12px 30px rgba(0,0,0,.5);
}
.card h2{margin:0 0 10px 0; font-weight:600}
.card input{
  width:100%;
  padding:12px 14px;
  margin:6px 0;
  border-radius:24px;
  border:none;
  background:#2a3942;
  color:#e9edef;
}
.row{display:flex; gap:8px; flex-wrap:wrap}
.row button{
  flex:1; min-width:120px;
  padding:10px 12px;
  border:none; border-radius:20px;
  background:#25d366; color:#fff;
}

/* ===== Header ===== */
.header{
  position:fixed; top:0; left:0; right:0;
  height:60px;
  display:flex; align-items:center; gap:10px;
  padding:10px;
  background:#202c33;
  z-index:10;
}
.header img{width:40px;height:40px;border-radius:50%}
.header .title{font-weight:600}
.header .status{font-size:12px; opacity:.7}

/* ===== Messages ===== */
.messages{
  position:fixed; top:60px; bottom:70px; left:0; right:0;
  overflow-y:auto;
  padding:10px;
  display:flex; flex-direction:column; gap:6px;
}

/* message row */
.msg{display:flex; max-width:85%}
.me{align-self:flex-end; flex-direction:row-reverse}
.other{align-self:flex-start}

/* avatar */
.avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:#3a4b55; margin:0 6px; font-weight:600;
}

/* bubble */
.bubble{
  position:relative;
  padding:8px 10px;
  border-radius:12px;
  font-size:14px; line-height:1.4;
}

/* tails */
.me .bubble{
  background:#005c4b;
  border-bottom-right-radius:3px;
}
.me .bubble::after{
  content:"";
  position:absolute; right:-6px; bottom:0;
  border:6px solid transparent;
  border-left-color:#005c4b;
  border-bottom:0;
}

.other .bubble{
  background:#202c33;
  border-bottom-left-radius:3px;
}
.other .bubble::after{
  content:"";
  position:absolute; left:-6px; bottom:0;
  border:6px solid transparent;
  border-right-color:#202c33;
  border-bottom:0;
}

.name{font-size:12px; opacity:.7; margin-bottom:2px}
.time{font-size:10px; opacity:.7; margin-top:3px; text-align:left}

/* ===== Input ===== */
.input{
  position:fixed; bottom:0; left:0; right:0;
  height:70px;
  display:flex; align-items:center; gap:8px;
  padding:8px;
  background:#202c33;
}
.input input{
  flex:1;
  padding:12px 14px;
  border-radius:24px;
  border:none;
  background:#2a3942;
  color:#e9edef;
}
.send{
  width:46px;height:46px;border-radius:50%;
  border:none; background:#25d366;
  font-size:18px; color:#fff;
}
</style>
</head>

<body>

<!-- ===== Login ===== -->
<div id="start">
  <div class="card">
    <h2>AlamChat</h2>
    <input id="name" placeholder="اسمك (دخول سريع)">
    <div class="row">
      <button onclick="quickLogin()">👤 دخول سريع</button>
    </div>
  </div>
</div>

<!-- ===== Chat ===== -->
<div id="chat" style="display:none">
  <div class="header">
    <img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
    <div>
      <div class="title">AlamChat</div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="اكتب رسالة..." oninput="typing()">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
  databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
});

let name="";

/* start */
function quickLogin(){
  const n=document.getElementById("name").value.trim();
  if(!n) return alert("اكتب اسمك");
  name=n;
  start.style.display="none";
  chat.style.display="block";
}

/* send */
function send(){
  const text=msgInput.value.trim();
  if(!text) return;
  firebase.database().ref("chat").push({
    name, text,
    time:new Date().toLocaleTimeString()
  });
  msgInput.value="";
}

/* receive */
firebase.database().ref("chat").on("child_added",snap=>{
  const m=snap.val();
  if(!m) return;

  const isMe = m.name===name;
  const div=document.createElement("div");
  div.className="msg "+(isMe?"me":"other");

  div.innerHTML = `
    <div class="avatar">${m.name?m.name[0]:"👤"}</div>
    <div class="bubble">
      <div class="name">${m.name||"مستخدم"}</div>
      ${m.text}
      <div class="time">${m.time||""}</div>
    </div>
  `;

  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
});

/* typing */
function typing(){
  firebase.database().ref("typing").set(name);
  setTimeout(()=>firebase.database().ref("typing").set(""),800);
}
firebase.database().ref("typing").on("value",s=>{
  const t=s.val();
  status.innerText = (t && t!==name)? t+" يكتب..." : "";
});
</script>

</body>
</html>

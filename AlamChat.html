<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:sans-serif;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
color:#e9edef;
}
body::before{content:"";position:fixed;inset:0;background:rgba(11,20,26,.85);z-index:-1}

/* Header */
.header{
position:fixed;top:0;width:100%;height:60px;background:#202c33;
display:flex;align-items:center;justify-content:space-between;padding:0 10px;
}
.left{display:flex;align-items:center;gap:10px}
.left img{width:40px;height:40px;border-radius:50%}
.version{font-size:12px;color:#25d366}
.status{font-size:11px;opacity:.7}

/* Messages */
.messages{
position:fixed;top:60px;bottom:70px;width:100%;
overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px;
}
.msg{display:flex;max-width:85%}
.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}

/* Bubble */
.bubble{padding:8px 10px;border-radius:12px;position:relative}
.me .bubble{background:#005c4b;border-bottom-right-radius:3px}
.other .bubble{background:#202c33;border-bottom-left-radius:3px}

.me .bubble::after{
content:"";position:absolute;right:-6px;bottom:0;
border:6px solid transparent;border-left-color:#005c4b
}
.other .bubble::after{
content:"";position:absolute;left:-6px;bottom:0;
border:6px solid transparent;border-right-color:#202c33
}

.sender{font-size:12px;opacity:.7}
.meta{font-size:10px;opacity:.7;display:flex;gap:5px;justify-content:flex-end}
.tick{font-size:12px}
.read{color:#4fc3f7}

/* reply */
.reply{
border-left:3px solid #25d366;
padding-left:5px;
font-size:12px;
opacity:.8;
margin-bottom:3px;
}

/* reactions */
.reacts{font-size:12px;margin-top:3px}

/* Input */
.input{
position:fixed;bottom:0;width:100%;
display:flex;padding:8px;background:#202c33;gap:5px;
}
.input input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a3942;color:#fff}
.send{width:45px;height:45px;border-radius:50%;border:none;background:#25d366}

/* Attach */
.attach-menu{
position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
background:#111b21;padding:15px;border-radius:20px;
display:none;grid-template-columns:repeat(3,1fr);gap:15px;
}

/* Top bar */
#topBar{
position:fixed;top:0;width:100%;height:60px;background:#111b21;
display:none;align-items:center;justify-content:space-around;z-index:10;
}
#reactions{position:fixed;top:60px;width:100%;display:none;justify-content:center;gap:10px}
</style>
</head>

<body>

<div id="topBar">
<button onclick="copyMsg()">📋</button>
<button onclick="deleteMsg()">🗑️</button>
<button onclick="setReply()">↩️</button>
<button onclick="closeBar()">❌</button>
</div>

<div id="reactions">
<button onclick="react('👍')">👍</button>
<button onclick="react('❤️')">❤️</button>
<button onclick="react('😂')">😂</button>
</div>

<div class="header">
<div class="left">
<img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<div>
<div>AlamChat <span class="version" id="ver"></span></div>
<div id="status" class="status"></div>
</div>
</div>
<button onclick="logout()">🚪</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<button onclick="toggleMenu()">➕</button>
<input id="msgInput" oninput="typing()" placeholder="اكتب...">
<input type="file" id="imgInput" hidden>
<button class="send" onclick="send()">➤</button>
</div>

<div id="attachMenu" class="attach-menu">
<div onclick="imgInput.click()">🖼️</div>
<div>📄</div>
<div>🎧</div>
</div>

<script>
const APP_VERSION="v1.2";
ver.innerText=APP_VERSION;

firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
});

let currentUser,selectedMsg=null,replyText=null;

firebase.auth().signInAnonymously();
firebase.auth().onAuthStateChanged(u=>{
if(u){
currentUser=u;
firebase.database().ref("online/"+u.uid).set(true);
window.onbeforeunload=()=>firebase.database().ref("online/"+u.uid).remove();
}
});

/* send */
function send(){
let text=msgInput.value.trim();
if(!text)return;

firebase.database().ref("chat").push({
uid:currentUser.uid,
text,
reply:replyText,
time:new Date().toLocaleTimeString(),
seen:false,
reacts:{}
});

msgInput.value="";
replyText=null;
}

/* receive */
firebase.database().ref("chat").on("child_added",snap=>{
render(snap.key,snap.val());
});
firebase.database().ref("chat").on("child_changed",snap=>{
document.getElementById("m_"+snap.key)?.remove();
render(snap.key,snap.val());
});

function render(id,m){
let div=document.createElement("div");
div.className="msg "+(m.uid==currentUser.uid?"me":"other");
div.id="m_"+id;

let reacts=Object.values(m.reacts||{}).join(" ");

div.innerHTML=`
<div class="bubble">
${m.reply?`<div class="reply">${m.reply}</div>`:""}
${m.text||""}
<div class="meta">
${m.time}
${m.uid==currentUser.uid?`<span class="tick ${m.seen?'read':''}">${m.seen?'✔✔':'✔'}</span>`:""}
</div>
${reacts?`<div class="reacts">${reacts}</div>`:""}
</div>
`;

div.oncontextmenu=(e)=>{
e.preventDefault();
selectedMsg={id,data:m};
topBar.style.display="flex";
reactions.style.display="flex";
};

if(m.uid!=currentUser.uid && !m.seen){
firebase.database().ref("chat/"+id).update({seen:true});
}

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

/* actions */
function copyMsg(){
navigator.clipboard.writeText(selectedMsg.data.text||"");
closeBar();
}
function deleteMsg(){
firebase.database().ref("chat/"+selectedMsg.id).remove();
closeBar();
}
function setReply(){
replyText=selectedMsg.data.text;
closeBar();
}
function react(e){
firebase.database().ref("chat/"+selectedMsg.id+"/reacts/"+currentUser.uid).set(e);
closeBar();
}
function closeBar(){
topBar.style.display="none";
reactions.style.display="none";
}

/* typing */
function typing(){
firebase.database().ref("typing").set(currentUser.uid);
setTimeout(()=>firebase.database().ref("typing").set(""),800);
}
firebase.database().ref("typing").on("value",s=>{
status.innerText=s.val()?"يكتب...":"";
});

/* online */
firebase.database().ref("online").on("value",s=>{
if(!status.innerText) status.innerText="🟢 "+s.numChildren()+" متصل";
});

/* menu */
function toggleMenu(){
attachMenu.style.display=attachMenu.style.display=="grid"?"none":"grid";
}

/* logout */
function logout(){
firebase.auth().signOut();
location.reload();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{margin:0;background:#0b141a;color:#fff;font-family:sans-serif}

.login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:10px}
input{padding:10px;border:none;border-radius:20px;width:200px}
button{padding:10px;border:none;border-radius:20px;background:#25d366}

.messages{height:80vh;overflow:auto;padding:10px}
.msg{margin:5px}
.me{text-align:left}
.other{text-align:right}
</style>
</head>

<body>

<div id="login" class="login">
<h2>AlamChat</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="name" placeholder="اسمك">
<button onclick="register()">تسجيل</button>
<button onclick="loginUser()">دخول</button>
</div>

<div id="chat" style="display:none">
<h3 id="myName"></h3>
<div id="messages" class="messages"></div>

<input id="msgInput">
<button onclick="sendMessage()">ارسال</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const config={
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
}
firebase.initializeApp(config)

// تسجيل
function register(){
const email=document.getElementById("email").value
const pass=document.getElementById("password").value
const name=document.getElementById("name").value

if(!email||!pass||!name){alert("املأ البيانات");return}

firebase.auth().createUserWithEmailAndPassword(email,pass)
.then(res=>{
const uid=res.user.uid

// Avatar تلقائي
const avatar="https://ui-avatars.com/api/?name="+encodeURIComponent(name)

firebase.database().ref("users/"+uid).set({
name:name,
avatar:avatar
})

alert("تم التسجيل")
})
.catch(e=>alert(e.message))
}

// دخول
function loginUser(){
const email=document.getElementById("email").value
const pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)
.catch(()=>alert("بيانات غلط"))
}

// حالة المستخدم
firebase.auth().onAuthStateChanged(user=>{
if(user){

firebase.database().ref("users/"+user.uid).once("value",s=>{
const data=s.val()

document.getElementById("myName").innerText=data.name
})

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="block"
}
})

// ارسال
function sendMessage(){
const text=document.getElementById("msgInput").value
if(!text)return

firebase.database().ref("chat").push({
uid:firebase.auth().currentUser.uid,
text:text
})

document.getElementById("msgInput").value=""
}

// استقبال
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()

firebase.database().ref("users/"+m.uid).once("value",s=>{
const u=s.val()

const div=document.createElement("div")
div.className="msg"

div.innerHTML=`
<img src="${u.avatar}" width="25">
${u.name}: ${m.text}
`

document.getElementById("messages").appendChild(div)
})
})
</script>

</body>
</html>

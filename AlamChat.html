<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<!-- خطوط -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;

/* ✨ دمج خطين */
font-family:"Cairo","Press Start 2P",sans-serif;

background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
color:#fff;
}

/* Blur احترافي */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
z-index:-1;
}

/* تسجيل */
#start{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:15px;
}

#start input{
padding:14px;
border-radius:30px;
border:none;
width:70%;
max-width:280px;
font-size:16px;
}

#start button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#25d366;
color:#fff;
font-size:16px;
}

/* هيدر */
.header{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
gap:10px;
padding:10px;
background:rgba(32,44,51,0.85);
backdrop-filter:blur(10px);
}

.header img{
width:40px;
height:40px;
border-radius:50%;
}

.header span{
font-weight:bold;
}

/* رسائل */
.messages{
margin-top:65px;
height:calc(100vh - 130px);
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* رسالة */
.msg{
display:flex;
align-items:flex-end;
gap:6px;
margin:6px;
max-width:80%;
animation:fade 0.2s ease;
}

.me{
align-self:flex-end;
flex-direction:row-reverse;
}

.other{
align-self:flex-start;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
background:#444;
display:flex;
align-items:center;
justify-content:center;
}

/* الفقاعة */
.bubble{
padding:10px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

/* ألوان */
.me .bubble{
background:#005c4b;
border-bottom-right-radius:4px;
}

.other .bubble{
background:#202c33;
border-bottom-left-radius:4px;
}

/* وقت + seen */
.time{
font-size:10px;
opacity:0.7;
text-align:right;
}

.seen{
color:#4fc3f7;
margin-left:5px;
}

/* إدخال */
.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
gap:8px;
padding:8px;
background:rgba(32,44,51,0.85);
backdrop-filter:blur(10px);
}

.input input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
}

.send{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:#25d366;
color:#fff;
}

/* animation */
@keyframes fade{
from{opacity:0;transform:translateY(5px)}
to{opacity:1}
}
</style>
</head>

<body>

<div id="start">
<input id="name" placeholder="اسمك">
<button onclick="startChat()">دخول</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<img src="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<span>AlamChat</span>
<span id="typing"></span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب..." oninput="typing()">
<button class="send" onclick="send()">➤</button>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

let name=""
const start=document.getElementById("start")
const chat=document.getElementById("chat")
const messages=document.getElementById("messages")
const msgInput=document.getElementById("msgInput")
const typingSpan=document.getElementById("typing")

function startChat(){
let input=document.getElementById("name")
if(!input.value){alert("اكتب اسمك");return}

name=input.value
start.style.display="none"
chat.style.display="block"
}

function send(){
let text=msgInput.value.trim()
if(!text)return

firebase.database().ref("chat").push({
name,text,
time:new Date().toLocaleTimeString(),
seen:false
})

msgInput.value=""
}

/* typing */
function typing(){
firebase.database().ref("typing").set(name)
setTimeout(()=>firebase.database().ref("typing").set(""),1000)
}

firebase.database().ref("typing").on("value",s=>{
let t=s.val()
if(t && t!==name) typingSpan.innerText=t+" يكتب..."
else typingSpan.innerText=""
})

/* استقبال */
firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()
let id=snap.key
if(!m||!m.name)return

let isMe=m.name===name

let div=document.createElement("div")
div.className="msg "+(isMe?"me":"other")

div.innerHTML=`
<div class="avatar">${m.name[0]}</div>

<div class="bubble">
${m.text}
<div class="time">
${m.time}
${isMe?`<span class="seen">✔✔</span>`:""}
</div>
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

if(!isMe){
document.getElementById("sound").play()
if(navigator.vibrate) navigator.vibrate(80)
firebase.database().ref("chat/"+id).update({seen:true})
}
})
</script>

</body>
  </html>

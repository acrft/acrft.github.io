<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:sans-serif;
color:#fff;

/* 🎮 رجعنا خلفية ماينكرافت */
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed;
}
body::before{
content:"";
position:fixed;inset:0;
background:rgba(11,20,26,.85);
z-index:-1;
}

/* login */
#login{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
}
.login-box{
background:#202c33;
padding:20px;
border-radius:15px;
text-align:center;
}
.login-box button{
padding:12px 20px;
border:none;
border-radius:25px;
background:#25d366;
color:#fff;
font-size:16px;
}

/* chat */
#chat{display:none}

.header{
position:fixed;top:0;width:100%;
background:#202c33;
padding:10px;
display:flex;justify-content:space-between;align-items:center;
}

.messages{
margin-top:60px;
margin-bottom:70px;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
display:flex;
max-width:85%;
margin:6px 0;
}

.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}

.avatar{
width:35px;height:35px;
border-radius:50%;
margin:0 5px;
}

.bubble{
padding:8px 10px;
border-radius:12px;
}

.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}

.name{
font-size:12px;
color:#25d366;
margin-bottom:2px;
}

/* input */
.input{
position:fixed;bottom:0;width:100%;
display:flex;padding:10px;background:#202c33;
}
.input input{
flex:1;padding:10px;
border-radius:20px;border:none;
background:#2a3942;color:#fff;
}
.send{
width:45px;height:45px;
border-radius:50%;
border:none;
background:#25d366;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>تسجيل الدخول</h3>
<button onclick="login()">الدخول بجوجل</button>
</div>
</div>

<!-- CHAT -->
<div id="chat">
<div class="header">
<div id="userInfo"></div>
<button onclick="logout()">🚪</button>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب...">
<button class="send" onclick="send()">➤</button>
</div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
authDomain:"alamchat1.firebaseapp.com",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const auth=firebase.auth()
let currentUser

/* 🔥 Google login */
function login(){
const provider = new firebase.auth.GoogleAuthProvider()
auth.signInWithPopup(provider)
}

/* state */
auth.onAuthStateChanged(user=>{
if(user){
currentUser=user

login.style.display="none"
chat.style.display="block"

/* عرض اسمك وصورتك */
userInfo.innerHTML=`
<img src="${user.photoURL}" width="30" style="border-radius:50%">
${user.displayName}
`
}
})

/* send message */
function send(){
let text=msgInput.value.trim()
if(!text)return

firebase.database().ref("chat").push({
uid:currentUser.uid,
name:currentUser.displayName,
photo:currentUser.photoURL,
text:text
})

msgInput.value=""
}

/* receive */
firebase.database().ref("chat").on("child_added",snap=>{
let m=snap.val()

let div=document.createElement("div")
div.className="msg "+(m.uid==currentUser.uid?"me":"other")

div.innerHTML=`
<img class="avatar" src="${m.photo}">
<div class="bubble">
<div class="name">${m.name}</div>
${m.text}
</div>
`

/* حذف الرسالة لصاحبها فقط */
if(m.uid==currentUser.uid){
div.onclick=()=>{
if(confirm("حذف؟")){
firebase.database().ref("chat/"+snap.key).remove()
}
}
}

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
})

/* logout */
function logout(){
auth.signOut()
location.reload()
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
background-size:cover;
}

/* تسجيل */
#start{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

#start input{
padding:12px;
border-radius:25px;
border:none;
width:200px;
}

#start button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#25d366;
color:#fff;
}

/* هيدر */
.header{
background:#202c33;
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

/* رسائل */
.messages{
height:calc(100vh - 130px);
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
display:flex;
align-items:flex-end;
gap:5px;
margin:5px;
max-width:75%;
}

.me{
align-self:flex-end;
flex-direction:row-reverse;
}

.other{
align-self:flex-start;
}

.avatar{
width:30px;
height:30px;
border-radius:50%;
background:#555;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

.bubble{
padding:10px;
border-radius:10px;
color:#fff;
}

.me .bubble{
background:#005c4b;
border-bottom-right-radius:0;
}

.other .bubble{
background:#202c33;
border-bottom-left-radius:0;
}

.time{
font-size:10px;
text-align:right;
opacity:0.7;
}

.seen{
color:#4fc3f7;
margin-left:5px;
}

.reply{
font-size:12px;
color:#ccc;
border-left:3px solid #25d366;
padding-left:5px;
margin-bottom:5px;
}

/* إدخال */
.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
padding:10px;
background:#202c33;
gap:5px;
}

.input input{
flex:1;
padding:10px;
border-radius:25px;
border:none;
}

.send{
background:#25d366;
border:none;
border-radius:50%;
width:45px;
height:45px;
color:#fff;
}

</style>
</head>

<body>

<div id="start">
<input id="name" placeholder="اسمك">
<button onclick="startChat()">دخول</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<span>AlamChat 💬</span>
<span id="typing"></span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" placeholder="اكتب..." oninput="typing()">
<input type="file" id="img">
<button class="send" onclick="send()">➤</button>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

const start = document.getElementById("start")
const chat = document.getElementById("chat")
const messages = document.getElementById("messages")
const msgInput = document.getElementById("msgInput")
const typingSpan = document.getElementById("typing")

let name=""
let replyText=null

function startChat(){
const input=document.getElementById("name")

if(!input.value){
alert("اكتب اسمك")
return
}

name=input.value
start.style.display="none"
chat.style.display="block"
}

function send(){
const text=msgInput.value.trim()
const file=document.getElementById("img").files[0]

let msg={
name,
text,
time:new Date().toLocaleTimeString(),
seen:false,
reply:replyText
}

if(file){
const reader=new FileReader()
reader.onload=e=>{
msg.img=e.target.result
firebase.database().ref("chat").push(msg)
}
reader.readAsDataURL(file)
}else{
firebase.database().ref("chat").push(msg)
}

msgInput.value=""
document.getElementById("img").value=""
replyText=null
}

/* typing */
function typing(){
firebase.database().ref("typing").set(name)
setTimeout(()=>firebase.database().ref("typing").set(""),1000)
}

firebase.database().ref("typing").on("value",s=>{
let t=s.val()
if(t && t!==name) typingSpan.innerText=t+" يكتب..."
else typingSpan.innerText=""
})

/* استقبال */
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()
const id=snap.key

if(!m || !m.name) return

const isMe=m.name===name

const div=document.createElement("div")
div.className="msg "+(isMe?"me":"other")

div.innerHTML=`
<div class="avatar">${m.name[0]}</div>

<div class="bubble">
${m.reply ? `<div class="reply">${m.reply}</div>`:""}
${m.img ? `<img src="${m.img}" width="150">`:""}
${m.text || ""}
<div class="time">
${m.time || ""}
${isMe ? `<span class="seen ${m.seen?'seen':''}">✔✔</span>`:""}
</div>
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

if(!isMe){
document.getElementById("sound").play()
if(navigator.vibrate) navigator.vibrate(100)
firebase.database().ref("chat/"+id).update({seen:true})
}

/* حذف */
div.onclick=()=>{
if(isMe && confirm("حذف؟")){
firebase.database().ref("chat/"+id).remove()
}
}

/* رد */
div.ondblclick=()=>{
replyText=m.text || "رسالة"
alert("هترد على: "+replyText)
}
})
</script>

</body>
</html>

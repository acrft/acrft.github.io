<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlamChat MAD</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png");
background-size:cover;
color:#fff;
}

.header{
background:rgba(32,44,51,0.9);
padding:10px;
display:flex;
justify-content:space-between;
}

.messages{
height:calc(100vh - 150px);
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
margin:5px;
display:flex;
flex-direction:column;
}

.me{align-self:flex-end}
.other{align-self:flex-start}

.bubble{
padding:10px;
border-radius:10px;
background:rgba(0,0,0,0.4);
}

.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}

.time{font-size:10px;text-align:right}
.seen{color:#4fc3f7}

.reply{
font-size:12px;
color:#ccc;
border-left:3px solid #25d366;
padding-left:5px;
margin-bottom:5px;
}

.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#202c33;
padding:10px;
gap:5px;
}

input{flex:1;padding:10px;border-radius:20px;border:none}

button{padding:10px;border:none;border-radius:50%;background:#25d366}
</style>
</head>

<body>

<div id="start">
<input id="name" placeholder="اسمك">
<button onclick="startChat()">دخول</button>
</div>

<div id="chat" style="display:none">

<div class="header">
<span id="status">Online</span>
<span id="typing"></span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msgInput" oninput="typing()">
<input type="file" id="img">
<button onclick="record()">🎤</button>
<button onclick="send()">➤</button>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",
databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"
})

let name=localStorage.getItem("name")||""
let replyText=null

function startChat(){
name=document.getElementById("name").value
localStorage.setItem("name",name)

start.style.display="none"
chat.style.display="block"

firebase.database().ref("online/"+name).set(Date.now())
}

window.onbeforeunload=()=>{
firebase.database().ref("online/"+name).remove()
}

/* إرسال */
function send(){
const text=msgInput.value
const file=img.files[0]

let msg={
name,
text,
time:new Date().toLocaleTimeString(),
seen:false,
reply:replyText
}

if(file){
const reader=new FileReader()
reader.onload=e=>{
msg.img=e.target.result
firebase.database().ref("chat").push(msg)
}
reader.readAsDataURL(file)
}else{
firebase.database().ref("chat").push(msg)
}

msgInput.value=""
img.value=""
replyText=null
}

/* تسجيل صوت */
function record(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
const rec=new MediaRecorder(stream)
rec.start()

let chunks=[]
rec.ondataavailable=e=>chunks.push(e.data)

setTimeout(()=>{
rec.stop()
rec.onstop=()=>{
const blob=new Blob(chunks)
const reader=new FileReader()
reader.onload=e=>{
firebase.database().ref("chat").push({
name,
audio:e.target.result,
time:new Date().toLocaleTimeString()
})
}
reader.readAsDataURL(blob)
}
},3000)
})
}

/* typing */
function typing(){
firebase.database().ref("typing").set(name)
setTimeout(()=>firebase.database().ref("typing").set(""),1000)
}

firebase.database().ref("typing").on("value",s=>{
let t=s.val()
if(t && t!==name) typing.innerText=t+" يكتب..."
else typing.innerText=""
})

/* استقبال */
firebase.database().ref("chat").on("child_added",snap=>{
const m=snap.val()
const id=snap.key

const div=document.createElement("div")
const isMe=m.name===name

div.className="msg "+(isMe?"me":"other")

div.innerHTML=`
<div class="bubble">
${m.reply ? `<div class="reply">${m.reply}</div>`:""}
${m.img ? `<img src="${m.img}" width="150">` : ""}
${m.audio ? `<audio controls src="${m.audio}"></audio>` : ""}
${m.text||""}
<div class="time">
${m.time}
${isMe ? `<span class="seen ${m.seen?'seen':''}">✔✔</span>`:""}
</div>
</div>
`

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

// صوت
if(!isMe) sound.play()

// seen
if(!isMe){
firebase.database().ref("chat/"+id).update({seen:true})
}

// حذف
div.onclick=()=>{
if(isMe) firebase.database().ref("chat/"+id).remove()
}

// رد
div.ondblclick=()=>{
replyText=m.text||"رسالة"
alert("هترد على: "+replyText)
}
})

/* Online */
firebase.database().ref("online").on("value",snap=>{
status.innerText="متصل الآن"
})
</script>

</body>
</html>

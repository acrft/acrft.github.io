<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlamChat v2.0</title>
<meta property="og:title" content="AlamChat">
<meta property="og:description" content="Minecraft Chat">
<meta property="og:image" content="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<meta property="og:type" content="website">
<link rel="icon" href="https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:sans-serif;color:#e9edef;background:url("https://image2url.com/r2/default/images/1775525811581-9dc91a60-c309-4cdd-ad97-7e786eb938b5.png") center/cover fixed}
body::before{content:"";position:fixed;inset:0;background:rgba(11,20,26,.40);z-index:-1}
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:15px}
.card{width:100%;max-width:360px;background:rgba(32,44,51,.92);border-radius:20px;padding:25px;text-align:center;backdrop-filter:blur(6px)}
.logo{width:85px;height:85px;border-radius:50%;margin:auto;margin-bottom:12px;background:url("https://image2url.com/r2/default/images/1775529228138-e4aa7777-4540-4bd6-9d5e-d9bdd7095990.png") center/cover}
.btn{width:100%;padding:14px;border:none;border-radius:30px;background:#25d366;color:#fff;font-size:16px;font-weight:bold;cursor:pointer}
.btn.loading{opacity:.6;pointer-events:none}
#chat{display:none}
.header{position:fixed;top:0;right:0;left:0;height:60px;background:#202c33;display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:100}
.user{display:flex;align-items:center;gap:10px;overflow:hidden}
.user img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.user-name{font-size:15px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.messages{position:fixed;top:60px;bottom:72px;right:0;left:0;overflow-y:auto;overflow-x:hidden;padding:10px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.msg{display:flex;max-width:85%;animation:show .15s linear}
@keyframes show{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.me{align-self:flex-end;flex-direction:row-reverse}
.other{align-self:flex-start}
.avatar{width:35px;height:35px;border-radius:50%;margin:0 5px;object-fit:cover;background:#2a3942;flex-shrink:0}
.bubble{padding:8px 10px;border-radius:14px;word-break:break-word;line-height:1.4;white-space:pre-wrap;overflow-wrap:anywhere}
.me .bubble{background:#005c4b}
.other .bubble{background:#202c33}
.name{font-size:12px;color:#25d366;margin-bottom:4px;font-weight:bold}
.message-image{max-width:220px;max-height:300px;object-fit:cover;border-radius:12px;margin-top:5px;display:block}
.input{position:fixed;bottom:0;right:0;left:0;display:flex;gap:5px;padding:8px;background:#202c33;z-index:100}
.input input{flex:1;padding:10px;border-radius:20px;border:none;background:#2a3942;color:#fff;outline:none;font-size:15px}
.send{width:45px;height:45px;border-radius:50%;border:none;background:#25d366;font-size:18px;cursor:pointer;flex-shrink:0}
.send:disabled{opacity:.5}
.mob-list{display:flex;gap:8px;margin-top:3px;overflow-x:auto;white-space:nowrap;max-width:180px}
.mob-list::-webkit-scrollbar{display:none}
.mob{display:flex;align-items:center;gap:3px;font-size:11px;background:#2a3942;padding:2px 6px;border-radius:10px;white-space:nowrap}
.logout-btn{width:40px;height:40px;border:none;border-radius:50%;background:#ff3b30;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.logout-btn:active{transform:scale(.95)}
</style>
</head>
<body>
<div id="login">
<div class="card">
<div class="logo"></div>
<h2>AlamChat</h2>
<button id="loginBtn" class="btn">🔵تسجيل🔴الدخول🟡بأستخدام🟢جوجل⚪️</button>
</div>
</div>
<div id="chat">
<div class="header">
<div class="user" id="userInfo"></div>
<button id="logoutBtn" class="logout-btn">🚪</button>
</div>
<div id="messages" class="messages"></div>
<div class="input">
<input id="msgInput" maxlength="500" placeholder="اكتب...">
<input type="file" id="imageInput" accept="image/*" hidden>
<button class="send" id="siteBtn">☘️</button>
<button class="send" id="imageBtn">🖼️</button>
<button class="send" id="sendBtn">📤</button>
</div>
</div>
<script>
firebase.initializeApp({apiKey:"AIzaSyCMkymWe_AEfY9X09UC-jnCN85zfCLU2h0",authDomain:"alamchat1.firebaseapp.com",databaseURL:"https://alamchat1-default-rtdb.firebaseio.com"});
const auth=firebase.auth();
const db=firebase.database();
const loginEl=document.getElementById("login");
const chatEl=document.getElementById("chat");
const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const sendBtn=document.getElementById("sendBtn");
const imageBtn=document.getElementById("imageBtn");
const siteBtn=document.getElementById("siteBtn");
const imageInput=document.getElementById("imageInput");
const msgInput=document.getElementById("msgInput");
const messagesEl=document.getElementById("messages");
const userInfo=document.getElementById("userInfo");
let currentUser;
let loadingMessages=false;
const chatRef=db.ref("chat");
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(console.error);
loginBtn.onclick=async()=>{
loginBtn.classList.add("loading");
const provider=new firebase.auth.GoogleAuthProvider();
try{
await auth.signInWithPopup(provider);
}catch(err){
console.log(err);
if(err.code==="auth/popup-blocked"||err.code==="auth/popup-closed-by-user"||err.code==="auth/cancelled-popup-request"){
auth.signInWithRedirect(provider);
}else{
alert(err.message);
}
}
loginBtn.classList.remove("loading");
};
auth.onAuthStateChanged(user=>{
if(user){
currentUser=user;
loginEl.style.display="none";
chatEl.style.display="block";
userInfo.innerHTML=`
<img src="${user.photoURL||'https://i.imgur.com/HeIi0wU.png'}">
<div>
<div class="user-name">${escapeHTML(user.displayName||"بدون اسم")}</div>
<div id="mobList" class="mob-list"></div>
</div>
`;
loadMessages();
loadMobs();
}else{
loginEl.style.display="flex";
chatEl.style.display="none";
}
});
sendBtn.onclick=send;
imageBtn.onclick=()=>{imageInput.click()};
siteBtn.onclick=()=>{window.open("https://acrft.github.io","_blank")};
msgInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});
function escapeHTML(text){
return String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function send(){
const text=msgInput.value.trim();
if(!text||!currentUser)return;
sendBtn.disabled=true;
chatRef.push({
uid:currentUser.uid,
name:currentUser.displayName||"بدون اسم",
photo:currentUser.photoURL||"https://i.imgur.com/HeIi0wU.png",
text:text,
time:Date.now()
}).then(()=>{
msgInput.value="";
}).catch(console.error).finally(()=>{
sendBtn.disabled=false;
});
}
imageInput.addEventListener("change",()=>{
const file=imageInput.files[0];
if(!file||!currentUser)return;
if(file.size>2*1024*1024){
alert("الصورة كبيرة جدًا");
return;
}
const reader=new FileReader();
reader.onload=e=>{
chatRef.push({
uid:currentUser.uid,
name:currentUser.displayName||"بدون اسم",
photo:currentUser.photoURL||"https://i.imgur.com/HeIi0wU.png",
image:e.target.result,
time:Date.now()
});
};
reader.readAsDataURL(file);
imageInput.value="";
});
function loadMessages(){
if(loadingMessages)return;
loadingMessages=true;
chatRef.off();
messagesEl.innerHTML="";
chatRef.limitToLast(100).on("child_added",snap=>{
if(!currentUser)return;
const m=snap.val();
const div=document.createElement("div");
div.className="msg "+(m.uid===currentUser.uid?"me":"other");
const safeName=escapeHTML(m.name||"بدون اسم");
const safeText=escapeHTML((m.text||"").trim());
div.innerHTML=`
${m.photo?`<img class="avatar" loading="lazy" src="${m.photo}" onerror="this.src='https://i.imgur.com/HeIi0wU.png'">`:`<div class="avatar"></div>`}
<div class="bubble">
<div class="name">${safeName}</div>
${safeText}
${m.image?`<img class="message-image" loading="lazy" src="${m.image}">`:""}
</div>
`;
messagesEl.appendChild(div);
requestAnimationFrame(()=>{
messagesEl.scrollTop=messagesEl.scrollHeight;
});
});
}
function loadMobs(){
const mobs=[
{emoji:"🧟",name:"Zombie"},
{emoji:"💣",name:"Creeper"},
{emoji:"🕷️",name:"Spider"},
{emoji:"💀",name:"Skeleton"},
{emoji:"🔥",name:"Blaze"},
{emoji:"🐷",name:"Piglin"},
{emoji:"👁️",name:"Enderman"},
{emoji:"🐉",name:"Dragon"},
{emoji:"🐺",name:"Wolf"},
{emoji:"🐱",name:"Cat"},
{emoji:"🐝",name:"Bee"},
{emoji:"🐼",name:"Panda"}
];
const container=document.getElementById("mobList");
if(!container)return;
container.innerHTML="";
let saved=sessionStorage.getItem("savedMobs");
let selected;
try{
selected=saved?JSON.parse(saved):null;
}catch{
selected=null;
}
if(!selected||!Array.isArray(selected)){
const shuffled=[...mobs].sort(()=>Math.random()-.5);
selected=shuffled.slice(0,3);
sessionStorage.setItem("savedMobs",JSON.stringify(selected));
}
selected.forEach(mob=>{
const div=document.createElement("div");
div.className="mob";
div.textContent=mob.emoji+" "+mob.name;
container.appendChild(div);
});
}
logoutBtn.onclick=async()=>{
logoutBtn.disabled=true;
try{
await auth.signOut();
messagesEl.innerHTML="";
}catch(err){
console.log(err);
}
logoutBtn.disabled=false;
};
</script>
</body>
</html>
